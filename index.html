<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Cloud Chat</title>

<style>

body{
font-family: Arial;
background:#f4f7f6;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.auth-bar{
display:flex;
align-items:center;
gap:10px;
}

.user-avatar{
width:40px;
height:40px;
border-radius:50%;
}

.message{
padding:8px 12px;
margin:6px 0;
border-radius:10px;
max-width:70%;
}

.my{
background:#007bff;
color:white;
margin-left:auto;
}

.other{
background:#eee;
}

.chat-box{
height:250px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>
<body>


<div class="container">

<button id="loginBtn">Войти через Google</button>

<div id="userInfo" class="auth-bar" style="display:none">
<img id="userPhoto" class="user-avatar">
<b id="userName"></b>
<button id="logoutBtn">Выйти</button>
</div>

</div>


<div class="container" id="chatSection" style="display:none">

<h4>Выберите собеседника</h4>

<select id="userSelect"></select>

<div class="chat-box" id="chatBox"></div>

<input id="messageInput" placeholder="Ваше сообщение">

<button id="sendBtn">Отправить</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyDMws0SYVrvFDH8CkCll2pk6E6wsXIujPA",
authDomain: "hlrk-4e440.firebaseapp.com",
projectId: "hlrk-4e440",
storageBucket: "hlrk-4e440.firebasestorage.app",
messagingSenderId: "297173692660",
appId: "1:297173692660:web:a93de4063393c7156f2ea1"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();



loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);



let currentChatUser = null;



onAuthStateChanged(auth,(user)=>{

if(user){

loginBtn.style.display="none";
userInfo.style.display="flex";
chatSection.style.display="block";

userName.innerText=user.displayName;
userPhoto.src=user.photoURL;

loadUsers();

}

else{

loginBtn.style.display="block";
userInfo.style.display="none";
chatSection.style.display="none";

}

});



async function loadUsers(){

const usersRef = collection(db,"users");

onSnapshot(usersRef,(snapshot)=>{

userSelect.innerHTML="";

snapshot.forEach(doc=>{

const u = doc.data();

if(u.uid !== auth.currentUser.uid){

const option=document.createElement("option");

option.value=u.uid;

option.text=u.name;

userSelect.appendChild(option);

}

});

});

}



userSelect.onchange=()=>{

currentChatUser=userSelect.value;

loadMessages();

}



function loadMessages(){

const q=query(collection(db,"messages"),orderBy("timestamp"));

onSnapshot(q,(snapshot)=>{

chatBox.innerHTML="";

snapshot.forEach(doc=>{

const m=doc.data();

if(

(m.sender==auth.currentUser.uid && m.receiver==currentChatUser)

||

(m.sender==currentChatUser && m.receiver==auth.currentUser.uid)

){

const div=document.createElement("div");

div.classList.add("message");

div.classList.add(

m.sender==auth.currentUser.uid ? "my":"other"

);

div.innerText=m.text;

chatBox.appendChild(div);

}

});

});

}



sendBtn.onclick=async ()=>{

if(!currentChatUser) return alert("Выберите пользователя");

const text=messageInput.value;

if(!text) return;

await addDoc(collection(db,"messages"),{

text:text,

sender:auth.currentUser.uid,

receiver:currentChatUser,

timestamp:serverTimestamp()

});

messageInput.value="";

}



</script>

</body>
</html>
